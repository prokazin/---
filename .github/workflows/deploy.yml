name: Обновление данных CoinDigest

on:
  schedule:
    - cron: '0 */1 * * *'   # Каждый час
  workflow_dispatch:          # Ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v3

      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Устанавливаем зависимости (опционально)
        run: |
          pip install requests

      - name: 🔄 Обновляем данные
        run: |
          echo "✅ Данные обновлены $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 📤 Коммитим и пушим изменения
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "🔄 Автообновление данных [skip ci]"
          git push
