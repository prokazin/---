name: Обновление новостей CoinDigest

on:
  schedule:
    - cron: '*/30 * * * *'   # Каждые 30 минут
  workflow_dispatch:          # Ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v3

      - name: 🐍 Устанавливаем Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Устанавливаем зависимости
        run: |
          npm init -y
          npm install node-fetch@2

      - name: 🔄 Запускаем скрипт отправки
        run: |
          node .github/workflows/send-news.js

      - name: 📤 Сохраняем историю и коммитим
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sent_history.json
          git diff --staged --quiet || git commit -m "🔄 Обновление истории новостей [skip ci]"
          git push
